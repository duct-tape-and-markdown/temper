# Channel 2 (specs/distribution.md, "What ships"): build the per-target
# engine binaries and publish the npm packages — the two platform packages
# carrying the prebuilt binary, then the SDK that pins them. Idempotent by
# design: every publish step skips a version the registry already has, so
# re-running converges (the install verb's own bar, held here too).
#
# First cut ships linux-x64 + win32-x64. darwin waits on the Apple
# notarizing decision (docs/ledger.md, "On John"); channel 3 (the plugin +
# marketplace.json) is deliberately not here yet.
#
# The version is sdk/package.json's, overridable by dispatch input — the
# override exists for the bootstrap ordering (platform packages must be on
# the registry before the SDK can declare optionalDependencies on them).
name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (default: sdk/package.json)"
        required: false
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            bin: temper
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
            bin: temper.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Resolve the version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          [ -z "$VERSION" ] && VERSION=$(node -p "require('./sdk/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Publish the platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          for spec in "linux-x64 linux temper" "win32-x64 win32 temper.exe"; do
            read -r PLATFORM OS BIN <<< "$spec"
            NAME="@dtmd/temper-$PLATFORM"
            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "$NAME@$VERSION already published — skipping"
              continue
            fi
            DIR="npm-dist/$PLATFORM"
            mkdir -p "$DIR/bin"
            cp "artifacts/engine-$PLATFORM/$BIN" "$DIR/bin/$BIN"
            chmod +x "$DIR/bin/$BIN"
            cp LICENSE-MIT LICENSE-APACHE "$DIR/"
            node -e "
              const fs = require('fs');
              fs.writeFileSync('$DIR/package.json', JSON.stringify({
                name: '$NAME',
                version: '$VERSION',
                description: 'temper engine binary for $PLATFORM (installed via @dtmd/temper)',
                repository: { type: 'git', url: 'git+https://github.com/duct-tape-and-markdown/temper.git' },
                license: '(MIT OR Apache-2.0)',
                os: ['$OS'],
                cpu: ['x64'],
              }, null, 2) + '\n');
              fs.writeFileSync('$DIR/README.md',
                'Prebuilt temper engine binary for $PLATFORM. Install [@dtmd/temper](https://www.npmjs.com/package/@dtmd/temper) instead of this package.\n');
            "
            # The leading ./ is load-bearing: a bare path with one slash is
            # parsed by npm as a GitHub owner/repo spec, not a directory.
            npm publish "./$DIR" --access public
          done
      - name: Publish the SDK
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          SDK_VERSION=$(node -p "require('./sdk/package.json').version")
          if [ "$SDK_VERSION" != "$VERSION" ]; then
            echo "sdk/package.json is $SDK_VERSION, publishing $VERSION — skipping the SDK (bootstrap dispatch)"
            exit 0
          fi
          if npm view "@dtmd/temper@$VERSION" version >/dev/null 2>&1; then
            echo "@dtmd/temper@$VERSION already published — skipping"
            exit 0
          fi
          cd sdk
          # The platform pair is version-locked: the SDK must install the
          # engines built from its own commit, so the pins are stamped to
          # the publishing version here — a hand-maintained pin shipped a
          # mismatched pair once and can't be trusted to track a bump.
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const k of Object.keys(p.optionalDependencies ?? {})) p.optionalDependencies[k] = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          npm install
          npm publish --access public
      - name: Attach standalone binaries to the tag's release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p standalone
          tar -C artifacts/engine-linux-x64 -czf standalone/temper-x86_64-unknown-linux-gnu.tar.gz temper
          (cd artifacts/engine-win32-x64 && zip -q "$GITHUB_WORKSPACE/standalone/temper-x86_64-pc-windows-msvc.zip" temper.exe)
          gh release create "$GITHUB_REF_NAME" --generate-notes standalone/* || gh release upload "$GITHUB_REF_NAME" standalone/* --clobber
