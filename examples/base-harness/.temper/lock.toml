[[declaration.nested_member]]
host = "decision:authority-arrow"
kind = "alternative"
key = "code-authoritative"
leaves = { body = "Rejected. Rational when humans author the code and decisions live nowhere else, but agent-authored code is output, and deriving intent from output is mining. It also defeats the docs' own purpose for agents: a doc that trails code cannot be trusted at planning time.", title = "Code authoritative" }

[[declaration.nested_member]]
host = "decision:authority-arrow"
kind = "alternative"
key = "per-change-doc-duty"
leaves = { body = "Rejected as the primary mechanism. A convention held by reviewer vigilance fails silently, one forgotten change at a time. It survives here only as a courtesy, downstream of the arrow — see the superseded ruling this decision replaces.", title = "Per change documentation duty" }

[[declaration.nested_member]]
host = "decision:authority-arrow"
kind = "passage"
key = "consequences"
leaves = { text = """
## Consequences

Documentation duties invert: there is no "remember to update the docs" step, because the docs move first and the delta drives the work. The cost is honesty about the return path — evidence against the corpus must enter through an authored surface (an amendment, an open question), which is slower than hot-patching code and letting docs decay. That cost is the point.

## Alternatives""" }

[[declaration.nested_member]]
host = "decision:authority-arrow"
kind = "passage"
key = "context"
leaves = { text = 'Repositories that document themselves must choose which side is authoritative when docs and code disagree. The conventional answer makes code the source of truth and docs a trailing description, held close by a per-change duty ("update the affected docs") that reviewers enforce. In a repository whose code is substantially agent-authored, that answer reads intent out of an artifact — the one direction this corpus forbids.' }

[[declaration.nested_member]]
host = "decision:authority-arrow"
kind = "passage"
key = "ruling"
leaves = { text = """
## Ruling

The corpus is authoritative. The documents under `docs/` render declared intent; code and configuration reconcile toward them. When docs and code disagree, the code has the bug or the corpus needs an authored amendment — never a silent doc edit to match the drift.""" }

[[declaration.nested_member]]
host = "flow:summarize"
kind = "passage"
key = "overview"
leaves = { text = """
Summarize is the toy's one behavior: read a checklist, report how much of it is done (`node src/main.js TODO.md`).

Participants: scanner, renderer.

## Steps""" }

[[declaration.nested_member]]
host = "flow:summarize"
kind = "step"
key = "scan"
leaves = { body = "Every line of the document is classified. Lines carrying a box become items; everything else drops out here and is never seen again downstream.", in = "scanner", title = "Scan the lines" }

[[declaration.nested_member]]
host = "flow:summarize"
kind = "step"
key = "summarize"
leaves = { body = "The surviving items tally into the summary line: done over total. The document itself is out of reach by design.", in = "renderer", title = "Render the summary" }

[[declaration.nested_member]]
host = "system:renderer"
kind = "invariant"
key = "derives-never-rereads"
leaves = { body = "The renderer takes the scanned items alone. If a count looks wrong, the scan is wrong; the renderer holds no second opinion about the document.", title = "The summary derives from scan results, never the document" }

[[declaration.nested_member]]
host = "system:renderer"
kind = "invariant"
key = "one-line"
leaves = { body = "The summary is a single line with no trailing detail. Anything richer is a new declared behavior, not a bigger string.", title = "One line out" }

[[declaration.nested_member]]
host = "system:renderer"
kind = "passage"
key = "overview"
leaves = { text = """
The renderer turns scan results into the one-line summary (`2/3 done`): items done over items total.

## Invariants""" }

[[declaration.nested_member]]
host = "system:scanner"
kind = "invariant"
key = "done-is-exact"
leaves = { body = "Lowercase `x`, nothing else. `[X]` and `[~]` are unrecognized lines under the invariant above.", title = "A done box is exactly `[x]`" }

[[declaration.nested_member]]
host = "system:scanner"
kind = "invariant"
key = "ignored-never-guessed"
leaves = { body = "A line without a box is not an item: the scanner drops it and does not repair near-misses. Loosening the pattern is a corpus amendment first, code second.", title = "Unrecognized lines are ignored, never guessed" }

[[declaration.nested_member]]
host = "system:scanner"
kind = "passage"
key = "overview"
leaves = { text = """
The scanner classifies the lines of a checklist document. A line is an item only when it carries a box: `- [ ]` open, `- [x]` done. The scan yields the items in document order and nothing else.

## Invariants""" }

