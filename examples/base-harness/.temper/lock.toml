[[declaration.kind]]
name = "decision"
governs_root = "docs/decisions"
governs_glob = "*.md"
unit_shape = "file"
registration = ["always"]
templates = ["alternative"]

[[declaration.kind]]
name = "flow"
governs_root = "docs/flows"
governs_glob = "*.md"
unit_shape = "file"
registration = ["always"]
templates = ["step"]

[[declaration.kind]]
name = "glossary"
governs_root = "docs"
governs_glob = "glossary.md"
unit_shape = "file"
registration = ["always"]
content = { regions = [{ region = "prose" }, { region = "collection", member_kind = "term" }] }

[[declaration.kind]]
name = "hook"
governs_root = ".claude"
governs_glob = "settings.json"
unit_shape = "file"
registration = ["event(event)"]
shape = "fields"
collection_address = { manifest = "settings.json", key_path = "hooks.<Event>" }

[[declaration.kind]]
name = "memory"
governs_root = "."
governs_glob = "**/CLAUDE.md"
unit_shape = "file"
registration = ["always"]

[[declaration.kind]]
name = "rule"
governs_root = ".claude/rules"
governs_glob = "*.md"
format = "yaml-frontmatter"
unit_shape = "file"
registration = ["paths-match(paths)"]

[[declaration.kind]]
name = "skill"
governs_root = ".claude/skills"
governs_glob = "*/SKILL.md"
format = "yaml-frontmatter"
unit_shape = "directory"
registration = ["user-invoked", "description-trigger(description)"]

[[declaration.kind]]
name = "source"
governs_root = "src"
governs_glob = "*.js"
unit_shape = "file"
registration = ["always"]

[[declaration.kind]]
name = "superseded-decision"
governs_root = "docs/decisions/superseded"
governs_glob = "*.md"
format = "yaml-frontmatter"
unit_shape = "file"
registration = ["always"]

[[declaration.kind]]
name = "system"
governs_root = "docs/systems"
governs_glob = "*.md"
format = "yaml-frontmatter"
unit_shape = "file"
registration = ["always"]
templates = ["invariant"]

[[declaration.clause]]
kind = "decision"
predicate = "unique-name"
severity = "required"

[[declaration.clause]]
kind = "flow"
predicate = "unique-name"
severity = "required"

[[declaration.clause]]
kind = "skill"
predicate = "required"
field = "name"
severity = "required"
guidance = "Every skill declares a `name` — the slug the harness binds to. Claude Code alone would default it from the directory name, but a nameless skill is not portable: the spec and Anthropic's upload validation both require it."
cite = "https://agentskills.io/specification#frontmatter (retrieved 2026-07-15)"

[[declaration.clause]]
kind = "skill"
predicate = "min_len"
field = "name"
severity = "required"
guidance = "A present-but-empty name fails the spec's 1-64 character bound."
cite = "https://agentskills.io/specification#name-field (retrieved 2026-07-15)"
bound = { min = 1 }

[[declaration.clause]]
kind = "skill"
predicate = "allowed_chars"
field = "name"
severity = "required"
guidance = "Lowercase letters, digits, and hyphens only — `PDF-Processing` is the spec's own counter-example. The charset also keeps XML out of the name, which Anthropic's upload validation separately forbids."
cite = "https://agentskills.io/specification#name-field (retrieved 2026-07-15)"
charset = { ranges = ["a-z", "0-9"], chars = "-" }

[[declaration.clause]]
kind = "skill"
predicate = "max_len"
field = "name"
severity = "required"
guidance = "Keep the name short and slug-like; it becomes a directory and an id."
cite = "https://agentskills.io/specification#name-field (retrieved 2026-07-15)"
bound = { max = 64 }

[[declaration.clause]]
kind = "skill"
predicate = "deny"
field = "name"
severity = "required"
guidance = "Reserved words, enforced by Anthropic's platform upload validation (not by the open spec, and not by Claude Code's runtime — which itself ships a `claude-api` skill). Keep them out if the skill will ever travel through the API or claude.ai."
cite = "https://platform.claude.com/docs/en/agents-and-tools/agent-skills/overview#skill-structure (retrieved 2026-07-15)"
values = ["anthropic", "claude"]

[[declaration.clause]]
kind = "skill"
predicate = "name-matches-dir"
severity = "required"
guidance = "The spec requires the name to match its parent directory. Claude Code decouples the two (the frontmatter name is a display label; the directory names the slash command, except for a plugin-root SKILL.md) — but a mismatch is a portability trap and a reader trap even where it loads."
cite = "https://agentskills.io/specification#name-field (retrieved 2026-07-15)"

[[declaration.clause]]
kind = "skill"
predicate = "required"
field = "description"
severity = "required"
guidance = "The description is how the model chooses this skill from potentially 100+ available — it is the skill's API. Claude Code would fall back to the body's first paragraph; the spec and upload validation require it declared."
cite = "https://agentskills.io/specification#frontmatter (retrieved 2026-07-15)"

[[declaration.clause]]
kind = "skill"
predicate = "min_len"
field = "description"
severity = "required"
guidance = "Say both what the skill does and when to use it, with the keywords a user would naturally say. Write in third person — the text is injected into the system prompt, and inconsistent point-of-view causes discovery problems."
cite = "https://agentskills.io/specification#description-field (retrieved 2026-07-15)"
bound = { min = 1 }

[[declaration.clause]]
kind = "skill"
predicate = "max_len"
field = "description"
severity = "required"
guidance = "The spec's cap. Claude Code additionally truncates the skill listing at 1,536 combined characters (description + when_to_use) — truncation, not rejection, but text past the fold cannot help the model choose."
cite = "https://agentskills.io/specification#description-field (retrieved 2026-07-15)"
bound = { max = 1024 }

[[declaration.clause]]
kind = "skill"
predicate = "max_len"
field = "compatibility"
severity = "required"
guidance = "Optional field; when present the spec caps it at 500 characters. Most skills do not need it."
cite = "https://agentskills.io/specification#frontmatter (retrieved 2026-07-15)"
bound = { max = 500 }

[[declaration.clause]]
kind = "skill"
predicate = "max_lines"
severity = "advisory"
guidance = "Progressive disclosure: keep SKILL.md under 500 lines and move detailed reference material to separate files, one level deep. Once a skill loads, its body stays in context across turns — every line is a recurring token cost. The context window is a public good."
cite = "https://agentskills.io/specification#progressive-disclosure (retrieved 2026-07-15)"
bound = { max = 500 }

[[declaration.clause]]
kind = "skill"
predicate = "forbidden_keys"
severity = "required"
guidance = "Cursor `.mdc` keys. Nothing in the Agent Skills spec or Claude Code's documented frontmatter accepts them — a skill authored with them is carrying dead configuration that another tool's semantics silently fail to apply."
cite = "https://agentskills.io/specification#frontmatter (retrieved 2026-07-15)"
keys = ["globs", "alwaysApply"]

[[declaration.clause]]
kind = "skill"
predicate = "glob-valid"
field = "paths"
severity = "required"
guidance = "The optional `paths` scope gates every invocation channel until Claude reads a file its globs match; each entry is a glob (brace expansion supported). An unparseable pattern — an unclosed `[`, say — is invalid under globset and silently matches nothing, so the gate never opens and the skill never registers, with no error surfaced. Fix the pattern or drop the field."
cite = "https://code.claude.com/docs/en/memory#path-specific-rules (retrieved 2026-07-15)"

[[declaration.clause]]
kind = "system"
predicate = "unique-name"
severity = "required"

[[declaration.clause]]
kind = "system"
predicate = "max_lines"
severity = "advisory"
guidance = "a system doc is navigational, not exhaustive — past ~120 lines, promote a section to a flow or split the system"
bound = { max = 120 }

[[declaration.requirement]]
name = "conduct"
required = true
prose = "how any agent behaves here — epistemics, gap handling, escalation — is declared, portable, and free of project facts"

[[declaration.requirement]]
name = "documented-spine"
kind = "system"
required = true
prose = "every load-bearing area of this repository's behavior is documented as a system that declares spine membership"

[[declaration.requirement.clauses]]
predicate = "count"
severity = "required"
guidance = "the spine is plural by definition — a one-system corpus is an undocumented repository with one essay"
count = { min = 2, max = 9007199254740991 }

[[declaration.requirement]]
name = "governance"
required = true
prose = "the harness maintains itself: the gate placements are wired, and growing the harness is itself a stated procedure"

[[declaration.requirement]]
name = "operations"
kind = "skill"
required = false
prose = "doing work to this project is a stated procedure — build, verify, diagnose live as invocable skills, never as chat folklore"

[[declaration.requirement]]
name = "orientation"
required = true
prose = "what this project is and where truth lives is stated ambiently — the map every session loads"

[[declaration.requirement]]
name = "standards"
required = false
prose = "what correct code and change look like, scoped to the trees the conventions govern"

