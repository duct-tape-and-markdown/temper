bound = { max = 120 }

[[declaration.requirement]]
name = "documented-spine"
kind = "system"
required = true
prose = "every load-bearing area of this repository's behavior is documented as a system that declares spine membership"

[[declaration.requirement.clauses]]
predicate = "count"
severity = "required"
guidance = "the spine is plural by definition — a one-system corpus is an undocumented repository with one essay"
count = { min = 2, max = 9007199254740991 }

