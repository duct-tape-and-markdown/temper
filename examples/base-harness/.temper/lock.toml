guidance = "a system doc is navigational, not exhaustive — past ~120 lines, promote a section to a flow or split the system"
bound = { max = 120 }

[[declaration.requirement]]
name = "documented-spine"
kind = "system"
required = false
prose = "every load-bearing area of this repository's behavior is documented as a system whose document claims spine membership"

[[declaration.requirement.clauses]]
predicate = "count"
severity = "required"
guidance = "the spine is plural by definition — a one-system corpus is an undocumented repository with one essay"
count = { min = 2, max = 9007199254740991 }

