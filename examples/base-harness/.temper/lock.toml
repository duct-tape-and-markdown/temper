[[declaration.kind]]
name = "decision"
governs_root = "docs/decisions"
governs_glob = "*.md"
unit_shape = "file"
registration = ["always"]

[[declaration.kind]]
name = "flow"
governs_root = "docs/flows"
governs_glob = "*.md"
format = "yaml-frontmatter"
unit_shape = "file"
registration = ["always"]

[[declaration.kind]]
name = "glossary"
governs_root = "docs"
governs_glob = "glossary.md"
unit_shape = "file"
registration = ["always"]
content = { regions = [{ region = "prose" }, { region = "collection", member_kind = "term" }] }

[[declaration.kind]]
name = "hook"
governs_root = ".claude"
governs_glob = "settings.json"
unit_shape = "file"
registration = ["event(event)"]
shape = "fields"
collection_address = { manifest = "settings.json", key_path = "hooks.<Event>" }

[[declaration.kind]]
name = "memory"
governs_root = "."
governs_glob = "**/CLAUDE.md"
unit_shape = "file"
registration = ["always"]

[[declaration.kind]]
name = "rule"
governs_root = ".claude/rules"
governs_glob = "*.md"
format = "yaml-frontmatter"
unit_shape = "file"
registration = ["paths-match(paths)"]

[[declaration.kind]]
name = "superseded-decision"
governs_root = "docs/decisions/superseded"
governs_glob = "*.md"
format = "yaml-frontmatter"
unit_shape = "file"
registration = ["always"]

[[declaration.kind]]
name = "system"
governs_root = "docs/systems"
governs_glob = "*.md"
unit_shape = "file"
registration = ["always"]

[[declaration.clause]]
kind = "decision"
predicate = "unique-name"
severity = "required"

[[declaration.clause]]
kind = "flow"
predicate = "unique-name"
severity = "required"

[[declaration.clause]]
kind = "system"
predicate = "unique-name"
severity = "required"

[[declaration.clause]]
kind = "system"
predicate = "max_lines"
severity = "advisory"
guidance = "a system doc is navigational, not exhaustive — past ~120 lines, promote a section to a flow or split the system"
bound = { max = 120 }

[[declaration.requirement]]
name = "documented-spine"
kind = "system"
required = true
prose = "every load-bearing area of this repository's behavior is documented as a system that declares spine membership"

[[declaration.requirement.clauses]]
predicate = "count"
severity = "required"
guidance = "the spine is plural by definition — a one-system corpus is an undocumented repository with one essay"
count = { min = 2, max = 9007199254740991 }

[[declaration.assembly]]
fact = "mode"
value = "warn"

[[declaration.assembly]]
fact = "edge"
from = "flow"
field = "participants"
to = "system"

[[declaration.assembly]]
fact = "edge"
from = "superseded-decision"
field = "superseded-by"
to = "decision"

[[declaration.satisfies]]
member = "corpus"
requirement = "documented-spine"

[[declaration.satisfies]]
member = "gate"
requirement = "documented-spine"

[[declaration.nested_member]]
host = "glossary:glossary"
kind = "term"
key = "corpus"

[[declaration.nested_member]]
host = "glossary:glossary"
kind = "term"
key = "source"

[[declaration.nested_member]]
host = "glossary:glossary"
kind = "term"
key = "projection"

[[declaration.nested_member]]
host = "glossary:glossary"
kind = "term"
key = "layout"

[[declaration.nested_member]]
host = "glossary:glossary"
kind = "term"
key = "reconciliation"

[[declaration.registration]]
kind = "hook"
key = "PreToolUse"
manifest = "settings.json"
key_path = "hooks.<Event>"

[[declaration.registration]]
kind = "hook"
key = "SessionStart"
manifest = "settings.json"
key_path = "hooks.<Event>"
