# Rule contract — `.claude/rules/*.md`. Curated guidance (human territory, like
# specs/ and .claude/); embedded as the built-in default for the `rule` artifact
# kind (specs/20-surface.md, "contract selection is by artifact kind"). Decidable
# clauses only; identity is the file path, not an internal name.

# `paths` is Claude Code's real scoping key. Declared so it's part of the known
# schema (the `optional` predicate is always satisfied — it documents, never fails).
[[clause]]
severity = "advisory"
predicate = "optional"
field = "paths"

# The Cursor `.mdc` keys Claude Code IGNORES. Forbidding them catches the exact
# mistake that motivated temper: a rule authored with `description`/`globs`/
# `alwaysApply` frontmatter is silently inert (loads nothing). This is the bug we
# made by hand on rust.md/collaboration.md early in the project.
[[clause]]
severity = "required"
predicate = "forbidden_keys"
keys = ["description", "globs", "alwaysApply"]

# Rules load at every session start (always-on context, paid each tick), so keep
# them lean — advisory, mirroring the CLAUDE.md <200-line guidance.
[[clause]]
severity = "advisory"
predicate = "max_lines"
max = 200
