# Skill contract — the Anthropic best-practice template (the "std-lib" default).
#
# CURATED GUIDANCE, NOT BUILD OUTPUT. contracts/ is human-authored territory, like
# specs/ and .claude/ — it encodes the tool's sourced opinions about a good skill.
# The build phase EMBEDS this (CHECK-CUTOVER) but never writes it. Adopt it,
# extend it, fork it, or ignore it (specs/10-contracts.md: templates are data).
#
# Every clause is a decidable predicate from the closed algebra — true or false
# given the artifact, never a guess. Sourced from the Anthropic skill spec + the
# registry-kill decision (specs/10-contracts.md). The undecidable best practices
# are DELIBERATELY ABSENT — they would be unsound proxies (00-intent.md law 3):
#   · "description has a trigger / when-to-use"   (semantic)
#   · "description is not vague" / no-op detection (semantic)
#   · "third person"                              (weak proxy)
#   · gerund naming / leading-word reuse          (judgment)
# Those stay prose guidance, never gate clauses.

# --- name: required, charset, length, reserved words ---

[[clause]]
severity = "required"
predicate = "required"
field = "name"

[[clause]]
severity = "required"
predicate = "min_len"
field = "name"
min = 1

[[clause]]
severity = "required"
predicate = "allowed_chars"
field = "name"
ranges = ["a-z", "0-9"]
chars = "-"

[[clause]]
severity = "required"
predicate = "max_len"
field = "name"
max = 64

[[clause]]
severity = "required"
predicate = "deny"
field = "name"
values = ["anthropic", "claude"]

[[clause]]
severity = "required"
predicate = "name-matches-dir"

# --- description: required, non-empty, length cap ---

[[clause]]
severity = "required"
predicate = "required"
field = "description"

[[clause]]
severity = "required"
predicate = "min_len"
field = "description"
min = 1

[[clause]]
severity = "required"
predicate = "max_len"
field = "description"
max = 1024

# --- body: progressive-disclosure budget (advisory — recommend, don't gate) ---

[[clause]]
severity = "advisory"
predicate = "max_lines"
max = 500

# --- no Cursor frontmatter leaking in (Claude Code ignores these keys) ---

[[clause]]
severity = "required"
predicate = "forbidden_keys"
keys = ["globs", "alwaysApply"]
