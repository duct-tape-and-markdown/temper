# The built-in lock — the compiled default program `temper` embeds for SDK-less
# checking (specs/distribution.md, "The stranger gate"). Declaration rows only:
# the twelve built-in kinds' facts and their default contract clauses, plus the
# unconditional `mode = "warn"` assembly fact — the root member's own enforcement
# mode (specs/model/representation.md, "The root member") — every harness carries
# absent an authored mode. No requirements, no satisfies, no provenance or
# emit-fingerprint rows — nothing was emitted, there are no members.
#
# Derived, never transcribed (specs/distribution.md, "Decision: the built-in
# lock is derived from the SDK module, never transcribed"): this is the
# real `[declaration.*]` family `drift::emit` writes for a memberless `Payload` whose
# declarations come from a memberless harness over the whole shipped std-lib:
# `@dtmd/temper/claude-code`'s eleven
# built-in kinds (`agent`, `command`, `hook`, `installed-plugin`, `marketplace`,
# `mcp-server`, `plugin-manifest`, `skill`, `supporting-doc`, `rule`, `memory`) and their
# default contracts (`agentDefaultContract`, `commandDefaultContract`,
# `hookDefaultContract`, `installedPluginDefaultContract`, `marketplaceDefaultContract`,
# `mcpServerDefaultContract`,
# `pluginManifestDefaultContract`, `skillDefaultContract`,
# `supportingDocDefaultContract`, `ruleDefaultContract`,
# `memoryAnthropicDefaultContract`), plus `dial`/`dialDefaultContract` off the SDK's
# *root* — temper's own kind, whose entries re-read these very clauses at a machine's
# declared severity, so it ships wherever they do. They are the identical rows an
# adopted harness's own emit produces, just with no members to project. Regenerate by
# re-running that memberless emit and re-embedding the resulting lock's declaration rows
# verbatim; never hand-edit a row here.
#
# The SDK module exports one `memory` kind (the `CLAUDE.md` locus) and no
# `provider`-qualified kind values, so this lock's twelve kind facts carry no `provider`
# column. Claude Code does not read `AGENTS.md` (code.claude.com/docs/en/memory,
# retrieved 2026-07-15), so no `agents-md.memory` kind ships and none appears here.
#
# `dial` is the one kind here declaring a `local` commitment class, and the one whose
# `toml-document` format has no write twin: emit never reads or writes a machine's dial
# document, and no row of it ever lands in a lock — the rows below declare the kind, which
# is the committed, reviewed half.
#
# `supporting-doc` is the one kind here at the nested-file locus, so its row alone
# carries no `governs` pair: its members' paths compose from their host skill's unit and
# `skill`'s own `templates` pattern, the only home that fact has. Its default contract is
# one clause — the format documents no schema to gate, so the only decidable fact left is
# the graph one: a supporting file no edge from its host skill reaches is never read.
#
# `installed-plugin` is the one kind here contributing a kind fact and no clause row at
# all: its default contract is empty, so twelve kinds carry eleven contracts' clauses. The
# format documents no gateable schema — an entry is one scalar under a key that is the
# member's identity rather than a declared field — and the absence is the honest encoding,
# not a row lost in regeneration.
#
# `plugin-manifest` is the one kind here at the `json-document` format: the whole artifact
# is one JSON object, so its top-level keys are the fields its clauses range over. Its
# contract is five rows against `name`'s presence, emptiness, and charset, the top-level
# `themes`/`monitors` spelling the experimental migration retires, and `keywords`'s
# declared `list` type. The rest of the `claude plugin validate --strict` profile —
# unrecognized top-level fields, and wrong-typed *component paths* — needs predicates the
# algebra does not carry yet (`sdk/src/builtins.ts`, `pluginManifestDefaultContract`), so
# no row here forges them: the first wants an allow-list over a closed key set, and the
# second an alternation, since `commands`/`agents` are documented `string|array` while
# `type` declares one lattice kind. `keywords`'s single declared kind is what makes it the
# expressible slice, so the row below lifts no part of the hold on the union-typed fields.

[[declaration.kind]]
name = "agent"
governs_root = ".claude/agents"
governs_glob = "**/*.md"
format = "yaml-frontmatter"
unit_shape = "named-field(name)"
registration = ["description-trigger(description)"]

[[declaration.kind]]
name = "command"
governs_root = ".claude/commands"
governs_glob = "*.md"
format = "yaml-frontmatter"
unit_shape = "file"
registration = ["user-invoked", "description-trigger(description)"]

[[declaration.kind]]
name = "dial"
governs_root = ".temper"
governs_glob = "dial.toml"
commitment = "local"
format = "toml-document"
unit_shape = "named-field(name)"

[[declaration.kind]]
name = "hook"
governs_root = ".claude"
governs_glob = "settings.json"
unit_shape = "file"
registration = ["event(event)"]
shape = "fields"
collection_address = { manifest = "settings.json", key_path = "hooks.<Event>" }

[[declaration.kind]]
name = "installed-plugin"
governs_root = ".claude"
governs_glob = "settings.json"
unit_shape = "file"
registration = ["enablement"]
shape = "fields"
collection_address = { manifest = "settings.json", key_path = "enabledPlugins.*" }

[[declaration.kind]]
name = "marketplace"
governs_root = ".claude-plugin"
governs_glob = "marketplace.json"
format = "json-document"
unit_shape = "named-field(name)"

[[declaration.kind]]
name = "mcp-server"
governs_root = "."
governs_glob = ".mcp.json"
unit_shape = "file"
registration = ["connection"]
shape = "fields"
collection_address = { manifest = ".mcp.json", key_path = "mcpServers.*" }

[[declaration.kind]]
name = "memory"
governs_root = "."
governs_glob = "**/CLAUDE.md"
unit_shape = "file"
registration = ["always"]

[[declaration.kind]]
name = "plugin-manifest"
governs_root = ".claude-plugin"
governs_glob = "plugin.json"
format = "json-document"
unit_shape = "named-field(name)"

[[declaration.kind]]
name = "rule"
governs_root = ".claude/rules"
governs_glob = "*.md"
format = "yaml-frontmatter"
unit_shape = "file"
registration = ["paths-match(paths)"]

[[declaration.kind]]
name = "skill"
governs_root = ".claude/skills"
governs_glob = "*/SKILL.md"
format = "yaml-frontmatter"
unit_shape = "directory"
registration = ["user-invoked", "description-trigger(description)"]
templates = [{ kind = "supporting-doc", path = "*.md" }]

[[declaration.kind]]
name = "supporting-doc"
unit_shape = "file"

[[declaration.clause]]
label = "agent.required.name"
kind = "agent"
predicate = "required"
field = "name"
severity = "required"
guidance = "Every subagent declares a `name` — its unique identifier. Claude Code binds identity to this field alone, never the filename, so a nameless subagent cannot be delegated to."
cite = "https://code.claude.com/docs/en/sub-agents (retrieved 2026-07-15)"

[[declaration.clause]]
label = "agent.allowed_chars.name"
kind = "agent"
predicate = "allowed_chars"
field = "name"
severity = "required"
guidance = "Lowercase letters and hyphens only — no digits, unlike a skill's `[a-z0-9-]` name. Hooks receive this value as `agent_type`."
cite = "https://code.claude.com/docs/en/sub-agents (retrieved 2026-07-15)"
charset = { ranges = ["a-z"], chars = "-" }

[[declaration.clause]]
label = "agent.unique-name"
kind = "agent"
predicate = "unique-name"
severity = "required"
guidance = "Keep `name` values unique across the whole tree — when two files in one scope declare the same name, Claude Code loads only one of them, silently shadowing the other."
cite = "https://code.claude.com/docs/en/sub-agents (retrieved 2026-07-15)"

[[declaration.clause]]
label = "agent.required.description"
kind = "agent"
predicate = "required"
field = "description"
severity = "required"
guidance = "The description is how Claude decides when to delegate to this subagent — write it so the trigger is unambiguous."
cite = "https://code.claude.com/docs/en/sub-agents (retrieved 2026-07-15)"

[[declaration.clause]]
label = "command.required.name"
kind = "command"
predicate = "required"
field = "name"
severity = "required"
guidance = "Every skill declares a `name` — the slug the harness binds to. Claude Code alone would default it from the directory name, but a nameless skill is not portable: the spec and Anthropic's upload validation both require it."
cite = "https://agentskills.io/specification#frontmatter (retrieved 2026-07-15)"

[[declaration.clause]]
label = "command.min_len.name"
kind = "command"
predicate = "min_len"
field = "name"
severity = "required"
guidance = "A present-but-empty name fails the spec's 1-64 character bound."
cite = "https://agentskills.io/specification#name-field (retrieved 2026-07-15)"
bound = { min = 1 }

[[declaration.clause]]
label = "command.allowed_chars.name"
kind = "command"
predicate = "allowed_chars"
field = "name"
severity = "required"
guidance = "Lowercase letters, digits, and hyphens only — `PDF-Processing` is the spec's own counter-example. The charset also keeps XML out of the name, which Anthropic's upload validation separately forbids."
cite = "https://agentskills.io/specification#name-field (retrieved 2026-07-15)"
charset = { ranges = ["a-z", "0-9"], chars = "-" }

[[declaration.clause]]
label = "command.max_len.name"
kind = "command"
predicate = "max_len"
field = "name"
severity = "required"
guidance = "Keep the name short and slug-like; it becomes a directory and an id."
cite = "https://agentskills.io/specification#name-field (retrieved 2026-07-15)"
bound = { max = 64 }

[[declaration.clause]]
label = "command.shape.name"
kind = "command"
predicate = "shape"
field = "name"
severity = "required"
guidance = "A hyphen separates segments, so it may not lead, trail, or double — `-pdf`, `pdf-`, and `pdf--processing` are the spec's own counter-examples. The charset clause above admits the hyphen; this places it."
cite = "https://agentskills.io/specification#name-field (retrieved 2026-07-17)"
shape = "hyphen-placement"

[[declaration.clause]]
label = "command.deny.name"
kind = "command"
predicate = "deny"
field = "name"
severity = "required"
guidance = "Reserved words, enforced by Anthropic's platform upload validation (not by the open spec, and not by Claude Code's runtime — which itself ships a `claude-api` skill). Keep them out if the skill will ever travel through the API or claude.ai."
cite = "https://platform.claude.com/docs/en/agents-and-tools/agent-skills/overview#skill-structure (retrieved 2026-07-15)"
values = ["anthropic", "claude"]

[[declaration.clause]]
label = "command.required.description"
kind = "command"
predicate = "required"
field = "description"
severity = "required"
guidance = "The description is how the model chooses this skill from potentially 100+ available — it is the skill's API. Claude Code would fall back to the body's first paragraph; the spec and upload validation require it declared."
cite = "https://agentskills.io/specification#frontmatter (retrieved 2026-07-15)"

[[declaration.clause]]
label = "command.min_len.description"
kind = "command"
predicate = "min_len"
field = "description"
severity = "required"
guidance = "Say both what the skill does and when to use it, with the keywords a user would naturally say. Write in third person — the text is injected into the system prompt, and inconsistent point-of-view causes discovery problems."
cite = "https://agentskills.io/specification#description-field (retrieved 2026-07-15)"
bound = { min = 1 }

[[declaration.clause]]
label = "command.max_len.description"
kind = "command"
predicate = "max_len"
field = "description"
severity = "required"
guidance = "The spec's cap. Claude Code additionally truncates the skill listing at 1,536 combined characters (description + when_to_use) — truncation, not rejection, but text past the fold cannot help the model choose."
cite = "https://agentskills.io/specification#description-field (retrieved 2026-07-15)"
bound = { max = 1024 }

[[declaration.clause]]
label = "command.shape.description"
kind = "command"
predicate = "shape"
field = "description"
severity = "required"
guidance = "Anthropic's platform upload validation rejects a description carrying an XML tag — the description is injected into the system prompt, where a tag is markup rather than text. Neither the open spec nor Claude Code's runtime enforces it, so this is the clause that keeps a skill portable through the API and claude.ai. Prose spelling a comparison (`use when x < y`) is not a tag and does not fire."
cite = "https://platform.claude.com/docs/en/agents-and-tools/agent-skills/overview#skill-structure (retrieved 2026-07-17)"
shape = "no-xml-tags"

[[declaration.clause]]
label = "command.max_len.compatibility"
kind = "command"
predicate = "max_len"
field = "compatibility"
severity = "required"
guidance = "Optional field; when present the spec caps it at 500 characters. Most skills do not need it."
cite = "https://agentskills.io/specification#frontmatter (retrieved 2026-07-15)"
bound = { max = 500 }

[[declaration.clause]]
label = "command.extent"
kind = "command"
predicate = "extent"
severity = "advisory"
guidance = "Progressive disclosure: keep SKILL.md under 500 rendered lines and move detailed reference material to separate files, one level deep. Measured render-side — the lines the projected artifact contributes to context, not the source body before any include resolves. Once a skill loads, its body stays in context across turns — every line is a recurring token cost. The context window is a public good."
cite = "https://agentskills.io/specification#progressive-disclosure (retrieved 2026-07-15)"
bound = { max = 500 }
unit = "lines"

[[declaration.clause]]
label = "command.forbidden_keys"
kind = "command"
predicate = "forbidden_keys"
severity = "required"
guidance = "Cursor `.mdc` keys. Nothing in the Agent Skills spec or Claude Code's documented frontmatter accepts them — a skill authored with them is carrying dead configuration that another tool's semantics silently fail to apply."
cite = "https://agentskills.io/specification#frontmatter (retrieved 2026-07-15)"
keys = ["globs", "alwaysApply"]

[[declaration.clause]]
label = "command.glob-valid.paths"
kind = "command"
predicate = "glob-valid"
field = "paths"
severity = "required"
guidance = "The optional `paths` scope gates every invocation channel until Claude reads a file its globs match; each entry is a glob (brace expansion supported). An unparseable pattern — an unclosed `[`, say — is invalid under globset and silently matches nothing, so the gate never opens and the skill never registers, with no error surfaced. Fix the pattern or drop the field."
cite = "https://code.claude.com/docs/en/memory#path-specific-rules (retrieved 2026-07-15)"

[[declaration.clause]]
label = "dial.required.name"
kind = "dial"
predicate = "required"
field = "name"
severity = "required"
guidance = "A dial names the machine it speaks for — its identity, and what its findings are reported under. There is no filename fallback: every machine's dial is `dial.toml`."

[[declaration.clause]]
label = "dial.type.name"
kind = "dial"
predicate = "type"
field = "name"
severity = "required"
value_type = ["string"]

[[declaration.clause]]
label = "dial.type.clause"
kind = "dial"
predicate = "type"
field = "clause"
severity = "required"
guidance = "The dialed clauses are an array of tables — `[[clause]]` per entry, each naming one `label` and one `severity`."
value_type = ["list"]

[[declaration.clause]]
label = "dial.required.clause[*].label"
kind = "dial"
predicate = "required"
field = "clause[*].label"
severity = "required"
guidance = "An entry names the clause it dials by the address the finding printed as its `rule` id — spell it back verbatim. An entry naming a label no clause in this harness carries is a finding, never a silent no-op."

[[declaration.clause]]
label = "dial.type.clause[*].label"
kind = "dial"
predicate = "type"
field = "clause[*].label"
severity = "required"
value_type = ["string"]

[[declaration.clause]]
label = "dial.required.clause[*].severity"
kind = "dial"
predicate = "required"
field = "clause[*].severity"
severity = "required"
guidance = "Severity is an entry's only verb: it is what a dial says, and all a dial says."

[[declaration.clause]]
label = "dial.enum.clause[*].severity"
kind = "dial"
predicate = "enum"
field = "clause[*].severity"
severity = "required"
guidance = "The two severities an authored clause declares under are the two a dial re-declares under — there is no third value that means `off`. Softening a clause to `advisory` still reports it, and is inert in block mode; hardening one to `required` binds in every mode."
values = ["required", "advisory"]

[[declaration.clause]]
label = "dial.closed-keys"
kind = "dial"
predicate = "closed-keys"
severity = "required"
guidance = "The dial's key set is exhaustive: `name` and `clause`, nothing else. A key outside it is a verb this schema does not have — most likely an attempt to spell deletion, which it cannot."

[[declaration.clause]]
label = "hook.enum.event"
kind = "hook"
predicate = "enum"
field = "event"
severity = "required"
guidance = "A hook keys under its lifecycle event; an event outside the documented set is dead configuration — Claude Code silently never fires a hook under an unrecognized event. If this is a newly-documented event, re-fetch code.claude.com/docs/en/hooks and extend temper's cited set rather than working around the finding."
cite = "https://code.claude.com/docs/en/hooks (retrieved 2026-07-15)"
values = ["SessionStart", "Setup", "UserPromptSubmit", "UserPromptExpansion", "PreToolUse", "PermissionRequest", "PermissionDenied", "PostToolUse", "PostToolUseFailure", "PostToolBatch", "Notification", "MessageDisplay", "SubagentStart", "SubagentStop", "TaskCreated", "TaskCompleted", "Stop", "StopFailure", "TeammateIdle", "InstructionsLoaded", "ConfigChange", "CwdChanged", "FileChanged", "WorktreeCreate", "WorktreeRemove", "PreCompact", "PostCompact", "Elicitation", "ElicitationResult", "SessionEnd"]

[[declaration.clause]]
label = "marketplace.required.name"
kind = "marketplace"
predicate = "required"
field = "name"
severity = "required"
guidance = "A marketplace declares a `name` — the identity users type when installing from it (`/plugin install my-tool@your-marketplace`) and the key each user registers it under. There is no directory fallback the way `plugin.json` has one."
cite = "https://code.claude.com/docs/en/plugin-marketplaces#required-fields (retrieved 2026-07-16)"

[[declaration.clause]]
label = "marketplace.min_len.name"
kind = "marketplace"
predicate = "min_len"
field = "name"
severity = "required"
guidance = "A present-but-empty name cannot key an install or qualify a plugin reference. Give it a real one."
cite = "https://code.claude.com/docs/en/plugin-marketplaces#required-fields (retrieved 2026-07-16)"
bound = { min = 1 }

[[declaration.clause]]
label = "marketplace.allowed_chars.name"
kind = "marketplace"
predicate = "allowed_chars"
field = "name"
severity = "required"
guidance = "Kebab-case, no spaces — lowercase letters, digits, and hyphens. The name is typed after an `@` to qualify every plugin installed from the marketplace, so a space or a capital makes it unquotable exactly where users type it."
cite = "https://code.claude.com/docs/en/plugin-marketplaces#required-fields (retrieved 2026-07-16)"
charset = { ranges = ["a-z", "0-9"], chars = "-" }

[[declaration.clause]]
label = "marketplace.deny.name"
kind = "marketplace"
predicate = "deny"
field = "name"
severity = "required"
guidance = "This name is reserved for official Anthropic use and a third-party marketplace cannot load under it. Claude Code re-checks the reserved list on every load, not only when the marketplace is added — so publishing under one of these names strands every user who already added you: the marketplace stops loading and reports that it is registered from an untrusted source, and they must remove and re-add it. The list also grows (before v2.1.205, `first-party-plugins` and `healthcare` were not on it). Names that merely *impersonate* an official marketplace — `official-claude-plugins`, `anthropic-plugins-v2` — are blocked too, but impersonation is a judgment no clause can decide: this clause holds the enumerated list, and steering clear of the lookalikes is yours."
cite = "https://code.claude.com/docs/en/plugin-marketplaces#required-fields (retrieved 2026-07-16)"
values = ["claude-code-marketplace", "claude-code-plugins", "claude-plugins-official", "claude-plugins-community", "claude-community", "anthropic-marketplace", "anthropic-plugins", "agent-skills", "anthropic-agent-skills", "knowledge-work-plugins", "life-sciences", "claude-for-legal", "claude-for-financial-services", "financial-services-plugins", "first-party-plugins", "healthcare"]

[[declaration.clause]]
label = "marketplace.required.owner"
kind = "marketplace"
predicate = "required"
field = "owner"
severity = "required"
guidance = "A marketplace names its maintainer. This clause decides the `owner` object's presence; the clause below decides that its `name` is filled."
cite = "https://code.claude.com/docs/en/plugin-marketplaces#owner-fields (retrieved 2026-07-17)"

[[declaration.clause]]
label = "marketplace.required.owner.name"
kind = "marketplace"
predicate = "required"
field = "owner.name"
severity = "required"
guidance = "`owner.name` is the maintainer or team behind the catalog, and it is required — an `owner` object carrying only `email` does not satisfy the schema. `owner.email` beside it is optional."
cite = "https://code.claude.com/docs/en/plugin-marketplaces#owner-fields (retrieved 2026-07-17)"

[[declaration.clause]]
label = "marketplace.required.plugins"
kind = "marketplace"
predicate = "required"
field = "plugins"
severity = "required"
guidance = "The `plugins` array is the catalog — a marketplace without it lists nothing. An empty array is a valid, if empty, catalog."
cite = "https://code.claude.com/docs/en/plugin-marketplaces#required-fields (retrieved 2026-07-17)"

[[declaration.clause]]
label = "marketplace.required.plugins[*].name"
kind = "marketplace"
predicate = "required"
field = "plugins[*].name"
severity = "required"
guidance = "Every catalog entry declares a `name` — the plugin identifier users type when installing (`/plugin install my-plugin@marketplace`), kebab-case and without spaces. An entry with no name cannot be installed, and this clause names the entry that omitted it by its own index."
cite = "https://code.claude.com/docs/en/plugin-marketplaces#plugin-entries (retrieved 2026-07-17)"

[[declaration.clause]]
label = "marketplace.required.plugins[*].source"
kind = "marketplace"
predicate = "required"
field = "plugins[*].source"
severity = "required"
guidance = "Every catalog entry declares a `source` — where the plugin is fetched from. A listed plugin with no source resolves to nothing. Which source form it is (a relative path, or one of the `github`/`url`/`git-subdir`/`npm` objects) is a union no clause can yet decide; the `MarketplaceSource` type carries that bar for an SDK author. Note that a relative-path source resolves against a *local copy* of the marketplace, so it fails to resolve for users who added the marketplace by direct URL to `marketplace.json`."
cite = "https://code.claude.com/docs/en/plugin-marketplaces#plugin-entries (retrieved 2026-07-17)"

[[declaration.clause]]
label = "mcp-server.enum.type"
kind = "mcp-server"
predicate = "enum"
field = "type"
severity = "required"
guidance = """A server's `type` names its transport; a value outside the documented set is one Claude Code cannot honor. Absent reads as `stdio` — but an entry that carries a `url` with no `type` is then a configuration error, because Claude Code treats it as a stdio server and skips it: add `type: "http"` (or `sse`/`ws`). A stdio server needs a `command`; a remote server needs a `url`. If this is a newly-documented transport, re-fetch code.claude.com/docs/en/mcp and extend temper's cited set rather than working around the finding."""
cite = "https://code.claude.com/docs/en/mcp (retrieved 2026-07-15)"
values = ["stdio", "http", "streamable-http", "sse", "ws"]

[[declaration.clause]]
label = "memory.extent"
kind = "memory"
predicate = "extent"
severity = "advisory"
guidance = "CLAUDE.md is always-on context, paid every session. The memory docs' size target is under 200 rendered lines per memory file — 'longer files consume more context and reduce adherence.' Measured render-side, off the projected artifact rather than the source body. For each line ask: would removing it cause Claude to make mistakes? If not, cut it. (Advisory: Claude Code loads the file in full regardless of length; this is a context-cost budget, not a hard cutoff.)"
cite = "https://code.claude.com/docs/en/memory#write-effective-instructions (retrieved 2026-07-15)"
bound = { max = 200 }
unit = "lines"

[[declaration.clause]]
label = "plugin-manifest.required.name"
kind = "plugin-manifest"
predicate = "required"
field = "name"
severity = "required"
guidance = "A manifest declares a `name` — the pack's identity and the namespace its components surface under (`plugin-dev:agent-creator`). Omitting the manifest entirely is supported and Claude Code then derives the name from the directory; a manifest that exists and has no `name` is the one case the loader rejects outright: `name: Invalid input: expected string, received undefined`."
cite = "https://code.claude.com/docs/en/plugins-reference#required-fields (retrieved 2026-07-16)"

[[declaration.clause]]
label = "plugin-manifest.min_len.name"
kind = "plugin-manifest"
predicate = "min_len"
field = "name"
severity = "required"
guidance = "A present-but-empty name cannot namespace a component or key an install. Drop the field to let Claude Code derive the name from the directory, or give it a real one."
cite = "https://code.claude.com/docs/en/plugins-reference#required-fields (retrieved 2026-07-16)"
bound = { min = 1 }

[[declaration.clause]]
label = "plugin-manifest.allowed_chars.name"
kind = "plugin-manifest"
predicate = "allowed_chars"
field = "name"
severity = "required"
guidance = "Kebab-case, no spaces — lowercase letters, digits, and hyphens. The name is a namespace prefix and an install key, so a space or a capital makes it unquotable in the places it is typed. Use `displayName` for the human-readable label: it may carry spaces and any casing, and is never used for lookup."
cite = "https://code.claude.com/docs/en/plugins-reference#required-fields (retrieved 2026-07-16)"
charset = { ranges = ["a-z", "0-9"], chars = "-" }

[[declaration.clause]]
label = "plugin-manifest.forbidden_keys"
kind = "plugin-manifest"
predicate = "forbidden_keys"
severity = "required"
guidance = "`themes` and `monitors` are experimental components and belong under the `experimental` key. Declaring them at the top level still loads today and `claude plugin validate` only warns — but `--strict` fails it, and a future release will require `experimental.*`, so a top-level spelling is a migration already scheduled against you."
cite = "https://code.claude.com/docs/en/plugins-reference#experimental-components (retrieved 2026-07-16)"
keys = ["themes", "monitors"]

[[declaration.clause]]
label = "plugin-manifest.type.keywords"
kind = "plugin-manifest"
predicate = "type"
field = "keywords"
severity = "required"
guidance = '`keywords` is an array of discovery tags, and a bare string is not a shorter spelling of a one-tag list: a wrong-typed field is a load error, so the plugin does not load at all — everywhere, not merely under `--strict`, which is the one rule here the forgiving runtime does not wave through. Write `["deployment"]` for a single tag.'
cite = "https://code.claude.com/docs/en/plugins-reference#unrecognized-fields (retrieved 2026-07-16)"
value_type = ["list"]

[[declaration.clause]]
label = "plugin-manifest.type.skills"
kind = "plugin-manifest"
predicate = "type"
field = "skills"
severity = "required"
guidance = '`skills` names custom skill directories — each holding a `<name>/SKILL.md` — as one `"./custom/skills/"` path or a list of them. Unlike its neighbours it *adds* to the default `skills/` scan rather than replacing it, so listing `"./skills/"` alongside your extra path is redundant, not required.'
cite = "https://code.claude.com/docs/en/plugins-reference#component-path-fields (retrieved 2026-07-17)"
value_type = ["string", "list"]

[[declaration.clause]]
label = "plugin-manifest.type.commands"
kind = "plugin-manifest"
predicate = "type"
field = "commands"
severity = "required"
guidance = """`commands` names flat `.md` skill files or directories, as one path, a list of them, or an object keyed by command name (each entry carrying `source` or inline `content`). Setting it *replaces* the default `commands/` scan — to keep the default and add to it, list it explicitly: `["./commands/", "./extras/"]`. The reference table names only the string and array forms; the object form is the published schema's, so a manifest using it is valid and this clause admits all three."""
cite = "https://code.claude.com/docs/en/plugins-reference#component-path-fields (retrieved 2026-07-17); object form per https://json.schemastore.org/claude-code-plugin-manifest.json (retrieved 2026-07-16)"
value_type = ["string", "list", "map"]

[[declaration.clause]]
label = "plugin-manifest.type.agents"
kind = "plugin-manifest"
predicate = "type"
field = "agents"
severity = "required"
guidance = "`agents` names custom agent files as one path or a list of them, and *replaces* the default `agents/` scan — a manifest that sets it and expects `agents/` to still be read ships a plugin missing every agent in that folder. Claude Code v2.1.140 and later warns about the ignored folder in `claude plugin list`."
cite = "https://code.claude.com/docs/en/plugins-reference#component-path-fields (retrieved 2026-07-17)"
value_type = ["string", "list"]

[[declaration.clause]]
