[[member.section]]
heading = "Kinds — the extraction algebra and the kind system"
body = """

A **kind** is a class of artifact temper can read and check — `skill`, `rule`,
`spec`. Where `10-contracts.md` is the engine's *predicate* half (what an artifact
must **satisfy**), this is the *extraction* half (what an artifact **is**, and how
it is read). Two closed algebras, two instance-layers:

> predicates : contracts  ::  extraction : kinds

A kind is **data, not engine code** — the completion of "one engine, every layer an
instance" (`00-intent.md`). The engine knows no kind by name; it extracts features
and validates clauses.

## The extraction algebra — the soundness boundary, as data

Every kind is read by an **extractor**: parse a unit into the structured features a
contract validates. Extraction is **the soundness boundary** — a clause is sound
only if its feature is *deterministically extractable*; garbage extraction would
forge false positives, so extractors admit only surface-decidable features.

Today extractors are engine code (`src/skill.rs`). The end state is that extraction
is **composed from a closed algebra of deterministic extraction primitives**, the
same way a contract is composed from the closed predicate vocabulary:

- **structured field** — a frontmatter / JSON / TOML value at a key-path (kind from
  the `type` lattice, `10-contracts.md`);
- **markdown structure** — ATX headings; named sections; a `## Decision` block
  (heading + its body); a fenced block — whose first consumer is the **genre
  fence** (`20-surface.md`): fenced extraction composed with a TOML parse
  yields a genre value's features, declared data at body position, never
  recognition;
- **text & file** — line count; file placement, naming, glob.

An author **composes** a kind from these; an author **writes no parsing**. The
closed vocabulary makes unsound extraction ("extract the meaning of paragraph 3")
**unsayable by construction** — the identical mechanism that keeps the predicate
algebra too weak to lie (`10-contracts.md`). Two closed algebras guard the two
boundaries: what you may *read*, and what you may *require*.

### Decision: extraction is a closed algebra, not author parsing

**Chosen:** a kind's extraction is composed from a fixed, engine-provided vocabulary
of deterministic extractors; the vocabulary is **harvested from the built-in kinds**
and extended deliberately. **Rejected:** letting a kind-definition carry arbitrary
extraction — a regex sweep, a script. Arbitrary extraction is the soundness
boundary's escape hatch: a kind that "extracts" a semantic property forges false
positives exactly as an unsound proxy predicate does. The author composes
extractors; the engine implements them; a genuinely missing primitive is a
deliberate vocabulary addition (`10-contracts.md`), never a per-kind hatch.

## Two categories of kind — ownership, not mechanism

A kind is defined the same way regardless of origin; what differs is **who owns the
definition**:

- **Built-in harness kinds** — the artifact kinds of *known harnesses* (Claude Code:
  `skill`, `rule`, `memory` — the `CLAUDE.md` family, with its own format facts:
  no frontmatter, `@`-imports, dual root locus — `agent`, `hook`, `command`, MCP,
  settings, plugin; Codex; …).
  **temper-maintained**, because the format is *external and evolving* — a skill's
  shape is the harness's truth, not the author's to invent. They are temper's
  **interface** to each harness, grouped per harness, shipped as the std-lib. The
  author **adopts** them.
- **Custom project kinds** — a project's *own* artifact kinds (its specs, ADRs,
  playbooks). **Author-defined at the project level**, composing the algebras.
  Project-specific; temper ships none of them.

`spec` is a **custom** kind — and temper's own first one, governing its `specs/`
(worked example below). It is *not* a harness artifact, which is exactly why it is
the author's to define, not temper's to ship.

### Decision: built-in vs custom is ownership, not a privileged mechanism

**Chosen:** both categories are kind-definitions over the same two algebras; the
line is *who maintains the definition* — temper tracks a harness format, or the
author models their own landscape. **Rejected:** a privileged built-in path with
custom kinds as a lesser bolt-on. This is "a new landscape is a new instance, never
new engine code" (`10-contracts.md`) made literal — including the extractor. Built-
ins are simply the kind-definitions temper ships and versions as harness adapters.
The identical non-privilege governs **packages** (the require-side): a built-in
package is just the one temper ships, and a project authors its own as a peer
(`10-contracts.md`, "a package is project-authorable, not vendor-privileged"). One
ownership axis cuts across both kinds and packages (`05-model.md`).

## A built-in kind is an adapter — two faces

A built-in kind mediates between its harness format and the surface
(`20-surface.md`): it **parses** the external format into the member's feature
shape — the read face, serving in-place extraction, `init`'s lift, and drift
detection — and **emits** a member back out to the format (`emit`'s
projection, deterministic). A member's features have **two sources, one
shape** (Decision below): extracted through the read face (in-place and
document-carried members) or declared as the module's typed fields
(module-carried members) — and every consumer downstream of the manifest is
carriage-blind. The surface is canonical; `check` never ranges over generated
output except to verify freshness. A custom kind typically has no external
format to adapt — its members are born on the surface, and its projection can
be near-identity.

### Decision: features have two sources, one shape — the algebra bounds both

**Chosen:** a module-carried member arrives **pre-extracted** — its declared
typed fields *are* its features, and the manifest schema bounds what a module
may declare to exactly the closed extraction vocabulary (the SDK's types are
that vocabulary spelled as types, `10-contracts.md`); an in-place or
document-carried member is **extracted** through the kind's composed read
face. One feature shape lands in the manifest either way, so the soundness
boundary holds unmoved: nothing reaches a predicate that the algebra could
not have decidably read. **Rejected:** (a) modules declaring features outside
the vocabulary (a computed feature, a semantic summary) — the manifest schema
rejects what extraction could not have produced, or declaration becomes the
algebra's escape hatch; (b) re-extracting a module's emitted projection to
"verify" its declaration — checking generated output against its own source,
circular by construction; the declaration is authored truth exactly as a
frontmatter field is.

The emit face also owns the **locus**: a member's projection target derives from
the kind's locus plus the member's id — a built-in's locus is the harness's own
convention (a skill loads from `.claude/skills/<name>/SKILL.md` or not at all),
a custom kind's is its declared `governs` (`40-composition.md`), which thus
serves both faces (the read face's scan root, the emit face's target). A member
never sets its own destination — it declares *what it is*, and where it lands
follows from what it is; `provenance.source_path` is a record of where an
imported member came from, never a setting. Nor is import a lifecycle
prerequisite: a member born on the surface projects identically, its drift
baseline established by the lock at first `emit` rather than by a lifted
hash.

### Decision: the adapter faces are declared — a kind names its projection format

**Chosen:** a kind's definition declares its **projection format** — a closed
vocabulary naming how a member's on-disk artifact is shaped — plus the format
facts that vary per kind: unit shape (a lone file, identity from the stem; a
directory with companions, identity from the directory name). The first and
only harvested entry is `yaml-frontmatter` (YAML frontmatter over a markdown
body — the Claude Code family's shape). The engine implements each format
**once, generically**: the read face splits the artifact per the declaration
and lifts the kind's declared fields into the feature shape; `emit`
renders members back byte-deterministically; drift compares declared fields with
no per-kind serializer. Built-in and custom kinds ride the same adapter — a
custom kind declaring a format gets init/extraction/emit for free — and the
per-kind adapter modules (`src/skill.rs`, `src/rule.rs`) retire into one
generic frontmatter adapter: the built-in/custom split becomes purely *source*.
The vocabulary is harvested from the kinds temper ships (it must be able to
describe every one of them) and grows deliberately, never per-kind. The
*rendering* vocabulary for born-on-surface kinds (a spec's projected standard
block) remains deferred until the corpus migration supplies real requirements.
**Rejected:** (a) per-kind adapter modules — the field list already lives in
the kind definition; a typed IR restates it as code, and the two homes drift;
(b) an author-supplied template language — codegen walking in through the emit
face, the closed-algebra escape hatch refused everywhere else.

### Decision: kind identity carries a provider axis

**Chosen:** a kind that mirrors an external format declares its **provider** —
the authority that *defines* that format. A provider is a tool (`claude-code`,
`cursor`, `codex`) or a standard (`agents-md`, `agent-skills`): the market
carries both kinds of authority, and neither a vendor nor a consuming-tool
axis survives the data (`docs/market-formats.md`, retrieved 2026-07-02 — spec
encodings of any specific format fact re-cite their source directly). Kind
identity is the qualified name `<provider>.<name>`; a **bare** reference (in
the assembly, a package binding, `satisfies` typing) resolves iff exactly one
kind in the assembly carries that bare name, and a collision is a load error
naming the qualified candidates — nobody pays a qualification tax until two
providers actually meet. A project's own kinds (`spec`) mirror nothing
external, declare no provider, and are bare — and an **explicit registration
owns its bare name outright**: a kind the assembly registers shadows any
unbound embedded carrier of the same bare name (registration is the loudest
declaration of intent there is), so embedded kinds collide among themselves
only over references no registration claims. Placement mirrors identity
(`kinds/claude-code/skill/KIND.md`), the classed-corpus precedent
(`90-spec-system.md`). A **published** package binds a qualified kind name —
publication is where the consumer's assembly is unknowable, so a bare binding
is a latent collision; the package's own name stays short. The kinds temper
ships today are **Claude Code's surfaces**: provider `claude-code`, with the
format's defining standard cited inside the definition where they differ (a
skill's *format* is agentskills.io's; its locus and activation are Claude
Code's) — a neutral `agent-skills.skill` kind over `.agents/skills/` is a
separate kind for the day a consumer demands it. **Rejected:** (a) a
**vendor** axis (`anthropic.rule`) — one vendor ships divergent surfaces
(Copilot), and vendors change under a format (Windsurf → Cognition/Devin);
(b) **active-profile resolution** (bare names meaning different kinds per
ambient profile) — a name whose meaning depends on context is the inference
smell in identity form; (c) **mandatory qualification everywhere** — a
verbosity tax on every author against a collision most projects never have.
(Resolves `(kind-harness-axis)`.)

## Extending a built-in kind

A built-in's **extraction is temper's** — it mirrors the real harness format;
redefining it would check against a fiction. Its **require-side is a package the
author binds and layers** (`40-composition.md`): adopt the built-in package, add
custom clauses, flip a severity. The effective contract is **base ∪ custom**. And
because the IR preserves unknown frontmatter keys verbatim (`20-surface.md`), a
project convention on a known artifact — a `team:` key on skills — is *already
extracted*; the author only adds a clause over it. Permissive extraction, layerable
package: use the artifact your way, check it your way.

### Decision: base-contract clauses are marked fact or opinion

**Chosen:** a built-in contract marks each clause a **harness fact** (the keys Claude
Code ignores; `name-matches-dir`) or a **best-practice opinion** (body length).
Both are overridable — temper imposes nothing (`00-intent.md` law 4) — but
downgrading a *fact* silences the exact breakage temper exists to catch, so the
marking makes that a **deliberate, visible** act, never an accident. **Rejected:** a
flat clause list where a stray `severity = "advisory"` silently guts a
harness-correctness check.

## The entity graph is a kind capability

A kind may declare **entities** (a member's header names the concepts whose one
home it is) and **relationships** (edges over **declared structured fields** —
`45-governance.md`; never mined from prose bodies — law 8, `00-intent.md`). A
kind that does yields a **dependency graph of intent**: removing a load-bearing
entity surfaces its **blast radius** deterministically (`30-landscapes.md`). So
the graph is *not* a spec-special mechanism — it is what *any* kind gets by
declaring entities + relationships, an opt-in capability layered on the closed
extraction the kind already composes.

### Decision: no body-mined references — the `references` primitive is retired

**Chosen:** the extraction algebra carries **no primitive that derives references
from a member's prose body**. Relationships range over declared structured
fields only (law 8, `00-intent.md`; the reference Decision in `45-governance.md`).
The `references` primitive — backtick filename spans, shape-tested by engine
code, suffix-normalized (`strip_suffix`) — is retired from the engine and the
vocabulary: it grepped prose and called the result structure, violating the
standing `45-governance.md` Decision, and each refinement it invited (a declared
normalization, then a declared `match` shape glob) refined the violation rather
than the model. **Rejected:** keeping it as an opt-in primitive — a
sound-looking tier-1 gate over mined edges forges findings in both directions
(prose that mentions a file is not an edge; an edge is not always mentioned),
law 3's exact failure mode. Backtick file mentions are typography, permanently.
(Supersedes `(reference-id-normalization)`; the spec corpus's real edges are
declared in member headers — `90-spec-system.md`, "the corpus is classed".)

## Activation — a kind's inherent world-edges

A kind declares how the harness activates its members — the **inbound boundary
edges** of the relation graph (`45-governance.md`, "coupling is a join"): the
world reaching into the landscape by its own mechanics, one-way because the
world signs nothing. The vocabulary is closed and harvested from the kinds
temper ships; every entry is an external fact, cited at the point of claim:

- **`always`** — loaded at launch, unconditionally. A rule without `paths` is
  "loaded at launch with the same priority as `.claude/CLAUDE.md`"; `CLAUDE.md`
  itself is loaded in full at launch (code.claude.com/docs/en/memory, retrieved
  2026-07-02).
- **`description-trigger(field)`** — the named field is always in context; the
  body loads on invocation: "skill descriptions are loaded into context so
  Claude knows what's available, but full skill content only loads when
  invoked" (code.claude.com/docs/en/skills, retrieved 2026-07-02).
- **`paths-match(field)`** — the member activates when the agent reads files
  matching the named glob field: "path-scoped rules trigger when Claude reads
  files matching the pattern, not on every tool use"
  (code.claude.com/docs/en/memory, retrieved 2026-07-02). An absent or blank
  field is **not** a dead edge — the harness falls back to unconditional
  loading ("rules without a `paths` field are loaded unconditionally and apply
  to all files", same retrieval); only a *present* field whose globs match
  nothing is provably dead.
- **`event(field)`** — the member executes at a named lifecycle event: "hooks
  execute as shell commands at fixed lifecycle events"
  (code.claude.com/docs/en/memory, retrieved 2026-07-02) — carried for the
  future `hook` kind, harvested now because the doc names the mechanic.

Activation is **per-kind mechanics over per-member data**: the *fact* that
rules activate by path-match is the kind's declaration; the glob *values* are
the member's ordinary `[clause.paths]`. No edge syntax appears in the member
document. What the declaration buys is the reachability predicate
(`45-governance.md`, "the world is a node"): a member whose declared activation
edge is dead — a blank skill `description`, a `paths` list matching zero files —
is decidably unreachable, the harness-shaped analogue of dead code.

## Directives — format-executed body syntax

A **directive** is body-carried syntax the format authority documents as
**executed** by the harness — not prose that mentions, grammar that *does*. The
admission test is execution: a documented directive is a declaration that
happens to live in the body (the body-side analogue of a structured field),
where a mention is typography forever (the `references` retirement above). The
vocabulary is closed, adapter-faced, and per-kind: a kind declares a directive
extraction only where the authority documents the syntax as executed *for that
kind's artifacts*.

- **`at-import`** — an `@path/to/file` occurrence imports the target file into
  context: documented for Claude Code memory files, recursion-capped, resolved
  relative to the importing file (code.claude.com/docs/en/memory, retrieved
  2026-07-02); Gemini documents the same grammar for its memory files
  (geminicli.com/docs/cli/gemini-md, retrieved 2026-07-02). Adopted by the
  shipped memory kinds once the extraction exists — never assumed for a kind
  whose docs are silent (a skill body's `@` is unmodeled until cited).

A directive yields **edges as facts**: each occurrence is an edge from the
importing member to a path, resolved at check time against provenance —
`source_path` is the join key between world paths and members. Three classes,
three verdicts: a target resolving to a **member** is a member→member observed
edge (it enters the relation graph, and reachability propagates over it —
`45-governance.md`); a target resolving to an ungoverned **repo file** is a
backed boundary edge; a target resolving to **nothing** is an **unbacked
pointer** — the importing member's finding, the silent-context-loss failure
class made author-time.

### Decision: directives are observed structure — execution is the admission test

**Chosen:** the extraction algebra admits body-carried syntax iff the format
authority documents it as executed by the harness — a closed per-syntax
vocabulary (`at-import`), one adapter face per syntax, declared per kind, cited
at the point of claim. Directive edges are **observed, never authored**
(`45-governance.md`, "observed format edges"): temper reads the format's own
one-way behavior as fact and demands nothing of the target — the gate checks
the pointer is backed and the graph stays sound, never consent. **Rejected:**
(a) treating directives as prose — a broken `@path` import is silent context
loss at runtime, the exact failure class `00-intent.md` moves to author-time;
law 8 bans mining *mentions*, and this Decision leaves the `references`
retirement fully in force (mention is not execution); (b) a generic
reference/link primitive — retired above, stays retired: syntaxes are admitted
one by one, each cited, never as a pattern language; (c) modeling a
member-target import as an authored join — the format executes the import
regardless of any consent ceremony temper invents (the demanded signature
would be fiction, law 3), and per-import join authoring is trace rot by
design.

## A kind definition — one composed object

A kind is the **declare-side** object over the extraction algebra — with no code of
its own:

- **extraction** — extractor primitives (above), each applied at a locus, each
  naming the feature it yields;
- **entities & relationships** (optional) — the concepts a member's header may
  declare as having their home here, and which declared fields are edges (the
  graph capability above);
- **activation** (optional) — the kind's inherent world-edges (above): how the
  harness reaches a member, and over which declared field;
- **directives** (optional) — the format-executed body syntaxes the authority
  documents for this kind's artifacts (above), each an edge-yielding extraction.
- **genres** (optional) — the kind's genre vocabulary: typed shapes for the
  members' recurring prose forms — named fields over **prose leaves** and
  keyed collections (`20-surface.md`, genre values), declared as data,
  serialized whole into the manifest schema. The bound package carries any
  predicates over them (a decision names at least one rejected alternative)
  — the shape is the kind's, the demand is the package's, the same ownership
  line as everywhere.

The **require-side** is not part of the kind object — it is a **package** bound to the
kind (`10-contracts.md`), carrying the clauses (`10-contracts.md`) over those features.
Where each half lives is the ownership line (above). A **built-in** kind is temper's,
shipped as a harness adapter: its *extraction* is temper's engine code (it mirrors an
external format the author cannot redefine), and it binds a *layerable built-in
package*. A **custom** kind is the **author's, authored under `.temper/kinds/<name>/`** as its
`KIND.md` (`20-surface.md`) — extraction and relationships composed from the algebra — and
binds a package — a project-authored one under `.temper/packages/` — by the same
by-name mechanism a built-in kind binds its embedded one (`10-contracts.md`). **Every kind
binds a package; none carries its contract inline** (`40-composition.md`).

### Decision: a custom kind is declared data, never engine code

**Chosen:** a custom kind's whole definition — extraction included — is composed
from the closed algebras and **authored under `.temper/kinds/<name>/`**, registered in
the assembly; the engine implements the primitives, the author only composes them.
**Rejected:** a custom kind carrying a bespoke extractor inside temper's crate — which
is exactly what temper's own `spec` kind is *today* (`src/spec.rs` + a hardwired
`import` scan + a would-be embedded contract), built before this mechanism existed.
That ships a custom kind as a built-in, breaking "temper ships none of them" (above): a
stranger installing temper would inherit temper's `spec` kind, and a project's own kind
would have nowhere to live but a patch to temper. Engine-code extraction is sanctioned
**only** for built-in harness adapters, whose format is external and evolving. temper's
own `spec` kind is authored under its own `.temper/kinds/` like any other custom kind;
the current engine-code scaffold is superseded.

## Worked example: temper's own spec corpus, custom kinds

temper governs its `specs/` with custom kinds — authored in temper's own
library and registered in the assembly (`40-composition.md`) by the
mechanism above, not shipped in the crate. The corpus is **classed** — `intent`,
`architecture`, `process`, each class a kind governed by placement, paired by
declared demands and `satisfies` claims (`90-spec-system.md`,
which owns the class structure). Its members are document-carried today; the
corpus's target carriage is module-carried — requirements as exported values,
`satisfies` as imports, the intent graph riding the module graph
(`20-surface.md`) — reached by a staged human ceremony exactly as the classed
migration was:

- **extraction:** ATX headings, `## Decision` blocks, line count, placement —
  markdown structure only, no body-mined references (Decision above). The
  corpus's edges are **declared** in member headers, never extracted from prose.
- **package (each class's require-side):** `max_lines` (advisory,
  `90-spec-system.md`'s ~150); decisions-name-alternatives (every `## Decision`
  carries a `Rejected` — a predicate over the decision-block extractor); and the
  class pairing — an `intent` member's declared entities must be satisfied by an
  `architecture` member (coverage over the fill edge, `10-contracts.md`).

Piloted over the corpus it confirms every Decision names its rejected
alternative and every declared entity has its architecture home, and flags the
over-length specs. This is the deepest dogfood: temper checking the corpus flume
derives from — self-hosting (`00-intent.md`) extended from `.claude/` to
`specs/`.

The corpus's genre target: `decision`, `law`, and `bound` genres declared on
the spec kinds, harvested from the corpus's own conventions. The
decisions-name-alternatives predicate keeps both spellings: at rung 2 it
stays the decision-block shape check over extracted headings (clause
features, never leaves); over genre values it is a schema fact. Migration
between rungs is the same staged human ceremony as the classed migration —
per document, never demanded (`30-landscapes.md`, the gradient)."""

[[member.section]]
heading = "The extraction algebra — the soundness boundary, as data"
body = """

Every kind is read by an **extractor**: parse a unit into the structured features a
contract validates. Extraction is **the soundness boundary** — a clause is sound
only if its feature is *deterministically extractable*; garbage extraction would
forge false positives, so extractors admit only surface-decidable features.

Today extractors are engine code (`src/skill.rs`). The end state is that extraction
is **composed from a closed algebra of deterministic extraction primitives**, the
same way a contract is composed from the closed predicate vocabulary:

- **structured field** — a frontmatter / JSON / TOML value at a key-path (kind from
  the `type` lattice, `10-contracts.md`);
- **markdown structure** — ATX headings; named sections; a `## Decision` block
  (heading + its body); a fenced block — whose first consumer is the **genre
  fence** (`20-surface.md`): fenced extraction composed with a TOML parse
  yields a genre value's features, declared data at body position, never
  recognition;
- **text & file** — line count; file placement, naming, glob.

An author **composes** a kind from these; an author **writes no parsing**. The
closed vocabulary makes unsound extraction ("extract the meaning of paragraph 3")
**unsayable by construction** — the identical mechanism that keeps the predicate
algebra too weak to lie (`10-contracts.md`). Two closed algebras guard the two
boundaries: what you may *read*, and what you may *require*.

### Decision: extraction is a closed algebra, not author parsing

**Chosen:** a kind's extraction is composed from a fixed, engine-provided vocabulary
of deterministic extractors; the vocabulary is **harvested from the built-in kinds**
and extended deliberately. **Rejected:** letting a kind-definition carry arbitrary
extraction — a regex sweep, a script. Arbitrary extraction is the soundness
boundary's escape hatch: a kind that "extracts" a semantic property forges false
positives exactly as an unsound proxy predicate does. The author composes
extractors; the engine implements them; a genuinely missing primitive is a
deliberate vocabulary addition (`10-contracts.md`), never a per-kind hatch.
"""

