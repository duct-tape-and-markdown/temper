[[member.section]]
heading = "Worked example: temper's own spec corpus, custom kinds"
body = """

temper governs its `specs/` with custom kinds — authored in temper's own
library and registered in the assembly (`40-composition.md`) by the
mechanism above, not shipped in the crate. The corpus is **classed** — `intent`,
`architecture`, `process`, each class a kind governed by placement, paired by
declared demands and `satisfies` claims (`90-spec-system.md`,
which owns the class structure). Its members are document-carried today; the
corpus's target carriage is module-carried — requirements as exported values,
`satisfies` as imports, the intent graph riding the module graph
(`20-surface.md`) — reached by a staged human ceremony exactly as the classed
migration was:

- **extraction:** ATX headings, `## Decision` blocks, line count, placement —
  markdown structure only, no body-mined references (Decision above). The
  corpus's edges are **declared** in member headers, never extracted from prose.
- **package (each class's require-side):** `max_lines` (advisory,
  `90-spec-system.md`'s ~150); decisions-name-alternatives (every `## Decision`
  carries a `Rejected` — a predicate over the decision-block extractor); and the
  class pairing — an `intent` member's declared entities must be satisfied by an
  `architecture` member (coverage over the fill edge, `10-contracts.md`).

Piloted over the corpus it confirms every Decision names its rejected
alternative and every declared entity has its architecture home, and flags the
over-length specs. This is the deepest dogfood: temper checking the corpus flume
derives from — self-hosting (`00-intent.md`) extended from `.claude/` to
`specs/`.

The corpus's genre target: `decision`, `law`, and `bound` genres declared on
the spec kinds, harvested from the corpus's own conventions. The
decisions-name-alternatives predicate keeps both spellings: at rung 2 it
stays the decision-block shape check over extracted headings (clause
features, never leaves); over genre values it is a schema fact. Migration
between rungs is the same staged human ceremony as the classed migration —
per document, never demanded (`30-landscapes.md`, the gradient)."""

